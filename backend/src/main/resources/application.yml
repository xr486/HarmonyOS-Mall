# ============================================================
# MySQL 配置
# ============================================================
spring:
  profiles:
    active: mysql

# MySQL 配置
---
spring:
  config:
    activate:
      on-profile: mysql
  application:
    name: hongmen-mall-backend
  datasource:
    url: jdbc:mysql://localhost:3306/hongmen_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: never

server:
  port: 8080

# 日志配置
logging:
  level:
    com.hongmen.mall: debug
