# ============================================================
# MySQL 配置
# ============================================================
spring:
  profiles:
    active: mysql

# MySQL 配置
---
spring:
  config:
    activate:
      on-profile: mysql
  application:
    name: hongmen-mall-backend
  datasource:
    url: jdbc:mysql://localhost:3306/hongmen_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: never

server:
  port: 8080

payment:
  notify-url: http://localhost:8080/api/v1/payment/notify
  alipay:
    mock: true
    app-id: 2021000123654321
    gateway-url: https://openapi.alipaydev.com/gateway.do
    charset: UTF-8
    sign-type: RSA2
    return-url: harmonymall://payment/return
  wechat:
    mock: true
    app-id: wx1234567890abcdef
    mch-id: 1234567890
    api-v3-key: your_api_v3_key_32_characters_here
  huawei:
    mock: true
    app-id: 123456789
    cp-id: mock_cp_id
    merchant-id: mock_merchant_id

logging:
  level:
    com.hongmen.mall: debug
