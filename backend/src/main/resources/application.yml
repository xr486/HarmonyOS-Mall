
server:
  port: 8080

spring:
  application:
    name: hongmen-mall-backend
  datasource:
    url: jdbc:h2:mem:hongmen_mall
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# 日志配置
logging:
  level:
    com.hongmen.mall: debug
