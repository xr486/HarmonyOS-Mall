# ============================================================
# 默认配置：MySQL 主库
# 切换 H2 内存库：启动参数 --spring.profiles.active=h2
# ============================================================
spring:
  profiles:
    active: mysql

# MySQL 配置
---
spring:
  config:
    activate:
      on-profile: mysql
  application:
    name: hongmen-mall-backend
  datasource:
    url: jdbc:mysql://localhost:3306/hongmen_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: never

server:
  port: 8080

cloud:
  db:
    project-id: 101653523864447476
    client-id: 1987754659304988480
    client-secret: FBA60629FDA9DD7BCA6F5FCCD7F4E32E0B1336B98ECD86B091DA77E6D2495AED
    zone-name: MainZone

# H2 开发配置（不需要 MySQL 时使用）
---
spring:
  config:
    activate:
      on-profile: h2
  application:
    name: hongmen-mall-backend
  datasource:
    url: jdbc:h2:mem:hongmen_mall
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8080

# 日志配置
logging:
  level:
    com.hongmen.mall: debug
